<style>
:root{--gold:#c9a84c;--gold-l:#e8c97a;--black:#080808;--purple:#7b4fa6;--white:#f5f0ea;--dim:rgba(245,240,234,.55)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:floatUp linear infinite;opacity:0}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.7}90%{opacity:.3}100%{transform:translateY(-10vh) scale(1.2);opacity:0}}
@keyframes breathe{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,8,.95);border-bottom:1px solid rgba(201,168,76,.1)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo img{width:36px;height:36px;object-fit:contain}
.nav-logo-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:6px;color:var(--gold);text-transform:uppercase}
.nav-back{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .3s}
.nav-back:hover{color:var(--gold)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:120px 24px 80px;position:relative;overflow:hidden}
.bg-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(123,79,166,.22) 0%,rgba(201,168,76,.06) 40%,transparent 70%);pointer-events:none;animation:breathe 7s ease-in-out infinite}
.content{position:relative;z-index:1;text-align:center;max-width:600px}
.eyebrow{font-size:9px;font-weight:500;letter-spacing:7px;text-transform:uppercase;color:var(--gold);margin-bottom:24px;display:block;opacity:0;animation:fadeUp .8s forwards .2s}
.title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,72px);font-weight:300;line-height:1.1;color:var(--white);margin-bottom:20px;opacity:0;animation:fadeUp .8s forwards .4s}
.title em{font-style:italic;color:var(--gold-l)}
.subtitle{font-size:13px;font-weight:300;letter-spacing:1px;color:var(--dim);line-height:2;max-width:440px;margin:0 auto 44px;opacity:0;animation:fadeUp .8s forwards .6s}
.divider-ornament{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:44px;opacity:0;animation:fadeUp .8s forwards .65s}
.orn-line{width:60px;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.4))}
.orn-line.rev{background:linear-gradient(to left,transparent,rgba(201,168,76,.4))}
.orn-diamond{width:5px;height:5px;background:var(--gold);transform:rotate(45deg)}
.tags{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;opacity:0;animation:fadeUp .8s forwards .7s}
.tag{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(201,168,76,.5);border:1px solid rgba(201,168,76,.15);padding:5px 14px}
.cta-block{opacity:0;animation:fadeUp .8s forwards .8s}
.cta-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:block}
.wa-btn{display:inline-flex;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#080808;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;padding:18px 44px;text-decoration:none;transition:all .3s;position:relative;overflow:hidden}
.wa-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .5s}
.wa-btn:hover::before{left:100%}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(201,168,76,.3)}
.wa-btn svg{width:18px;height:18px;fill:#080808}
.back-link{display:block;margin-top:28px;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,240,234,.3);text-decoration:none;transition:color .3s}
.back-link:hover{color:var(--gold)}
.wa-float{position:fixed;bottom:32px;right:32px;z-index:999;width:56px;height:56px;background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid rgba(123,79,166,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .4s;box-shadow:0 0 20px rgba(123,79,166,.3),0 8px 32px rgba(0,0,0,.5);animation:floatP 3s ease-in-out infinite}
.wa-float::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(123,79,166,.3);animation:ringP 2s ease-out infinite}
.wa-float:hover{transform:scale(1.1) translateY(-4px)}
.wa-float svg{width:24px;height:24px;fill:#25d366}
@keyframes floatP{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes ringP{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
@media(max-width:600px){nav{padding:16px 24px}.wa-btn{padding:16px 32px;font-size:9px;letter-spacing:2px}}
</style>
</head>
